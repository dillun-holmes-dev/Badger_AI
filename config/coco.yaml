# =============================================================================
# COCO Dataset Configuration — Common Objects in Context
# =============================================================================
#
# DOWNLOAD (copy-paste into terminal):
#   mkdir -p datasets/coco && cd datasets/coco
#   wget http://images.cocodataset.org/zips/train2017.zip        # 18GB, 118K images
#   wget http://images.cocodataset.org/zips/val2017.zip          # 1GB, 5K images
#   wget http://images.cocodataset.org/annotations/annotations_trainval2017.zip
#   unzip train2017.zip && unzip val2017.zip && unzip annotations_trainval2017.zip
#
# EXPECTED STRUCTURE:
#   datasets/coco/
#     train2017/              # 118,287 images
#     val2017/                # 5,000 images
#     annotations/
#       instances_train2017.json
#       instances_val2017.json
#
# EVALUATION: mAP@0.5:0.95 (primary), AP50, AP75, AP_S, AP_M, AP_L
# Protocol matches visionanalysis.org (640x640, PyTorch FP32, max_det=300)

path: "../datasets/coco"      # Root path to dataset
train: train2017              # Image folder (relative to path)
val: val2017                  # Validation images
train_ann: annotations/instances_train2017.json
val_ann: annotations/instances_val2017.json

